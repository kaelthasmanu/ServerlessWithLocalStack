# Elimina o comenta las líneas de org y app si no las necesitas
# org: kaelthasmanutesting
# app: testing
service: kaelthasmanutesting

plugins:
  - serverless-localstack
  - serverless-offline

custom:
  localstack:
    stages:
      - local
      - dev
    endpoint: http://localhost:4566
    autostart: false  # Asume que LocalStack ya está corriendo
    lambda:
      mountCode: true
  tableName: MyDynamoDBTable
  bucketName: demo-bucket-upload

provider:
  name: aws
  runtime: nodejs20.x
  stage: local  # Importante: usar stage 'local' para activar LocalStack
  region: us-east-1
  environment:
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    tableName: ${self:custom.tableName}
    bucketName: ${self:custom.bucketName}
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - dynamodb:*
      Resource: "*"
    - Effect: "Allow"
      Action:
        - "s3:*"
      Resource: "*"

functions:
  hello:
    handler: handler.hello
    events:
      - http:
          path: hello
          method: get
          cors: true
  getUser:
    handler: lambdas/endpoints/getUser.handler
    events:
      - http:
          path: user/{id}
          method: get
          cors: true
  getDataDynamoDB:
    handler: lambdas/endpoints/getDataDynamoDB.handler
    events:
      - http:
          path: data/{id}
          method: get
          cors: true
  createDataDynamoDB:
    handler: lambdas/endpoints/createDataDynamoDB.handler
    events:
      - http:
          path: data/{id}
          method: post
          cors: true
  createFile:
    handler: lambdas/endpoints/createFile.handler
    events:
      - http:
          path: file/{fileName}
          method: post
          cors: true
  getFile:
    handler: lambdas/endpoints/getFile.handler
    events:
      - http:
          path: file/{fileName}
          method: get
          cors: true


resources:
  Resources:
    DemoBucketUpload:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
    MyDynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST