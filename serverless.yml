# Elimina o comenta las líneas de org y app si no las necesitas
# org: kaelthasmanutesting
# app: testing
service: kaelthasmanutesting

plugins:
  - serverless-localstack
  - serverless-offline

custom:
  localstack:
    stages:
      - local
      - dev
    endpoint: http://localhost:4566
    autostart: false  # Asume que LocalStack ya está corriendo
    lambda:
      mountCode: true
  tableName: MyDynamoDBTable
  bucketName: demo-bucket-upload
  frontendBucketName: demo-app-frontend

provider:
  name: aws
  runtime: nodejs20.x
  stage: local  # Importante: usar stage 'local' para activar LocalStack
  region: us-east-1
  environment:
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    tableName: ${self:custom.tableName}
    bucketName: ${self:custom.bucketName}
  apiGateway:
    apiKeys:
      - MyFirstApiKey
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - dynamodb:*
      Resource: "*"
    - Effect: "Allow"
      Action:
        - "s3:*"
      Resource: "*"

functions: ${file(yml/functions.yml)}

resources:
  Resources:
    DemoBucketUpload:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
    MyDynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
    myAssumeRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: myAssumeRole
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: myLambdaPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:*
                    - s3:*
                  Resource: "*"

    # --- Frontend React App ---

    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.frontendBucketName}
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource: !Sub "arn:aws:s3:::${self:custom.frontendBucketName}/*"

  Outputs:
    FrontendBucketURL:
      Value: !Sub "http://${self:custom.frontendBucketName}.s3.localhost.localstack.cloud:4566/index.html"
      Description: URL de la app React en LocalStack S3 Website